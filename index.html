<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raux Phase 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Raux Phase 2</h1>
    <p>Build a session in the browser.</p>

    <input type="text" id="sessionInput" placeholder="Enter session name">

    <select id="modeInput">
      <option value="">Select mode</option>
      <option value="prototype">Prototype</option>
      <option value="build">Build</option>
      <option value="test">Test</option>
    </select>

    <p class="label">Choose mood</p>
    <div class="mood-buttons">
      <button class="mood-button" data-mood="focused" type="button">Focused</button>
      <button class="mood-button" data-mood="creative" type="button">Creative</button>
      <button class="mood-button" data-mood="calm" type="button">Calm</button>
      <button class="mood-button" data-mood="hype" type="button">Hype</button>
    </div>

    <div class="action-buttons">
      <button id="startButton" type="button">Start Session</button>
      <button id="resetButton" type="button">Reset</button>
    </div>

    <div id="outputBox" class="neutral">
      <p id="output">Waiting for input...</p>
    </div>

    <div class="history-section">
      <div class="history-header">
        <h2>Session History</h2>
        <div class="history-controls">
          <button id="exportButton" type="button">Export</button>
          <button id="clearHistoryButton" type="button">Clear History</button>
        </div>
      </div>

      <div class="filter-bar">
        <select id="filterMood">
          <option value="all">All moods</option>
          <option value="focused">Focused</option>
          <option value="creative">Creative</option>
          <option value="calm">Calm</option>
          <option value="hype">Hype</option>
        </select>

        <select id="filterMode">
          <option value="all">All modes</option>
          <option value="prototype">Prototype</option>
          <option value="build">Build</option>
          <option value="test">Test</option>
        </select>
      </div>

      <div id="historyList">
        <p class="empty-history">No sessions yet.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
